name: Run Unit Tests

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/EnergyCalculator.sln

      - name: Build solution
        run: dotnet build ./src/EnergyCalculator.sln --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test ./src/Test/EnergyCalculator.UnitTest/EnergyCalculator.UnitTest.csproj --configuration Release --no-build --verbosity normal